{% extends 'trifonova/base.html' %}

{% block title %}Ученики{% endblock %}

{% block content %}
<div class="header-actions">
    <h1>👥 Список учеников</h1>
    <a href="{% url 'trifonova:user_create' %}" class="btn btn-primary">+ Добавить ученика</a>
</div>

<table class="table">
    <thead>
        <tr>
            <th>ФИО</th>
            <th>Номер телефона</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.FIO }}</td>
            <td>{{ user.namber }}</td>
            <td class="actions">
                <a href="{% url 'trifonova:user_detail' user.pk %}" class="btn btn-small">Просмотр</a>
                <a href="{% url 'trifonova:user_update' user.pk %}" class="btn btn-small">Редактировать</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3" class="text-center">Нет учеников</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
