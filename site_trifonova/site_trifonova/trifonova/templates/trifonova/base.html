<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа танцев - {% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="{% url 'trifonova:index' %}" class="logo">💃 Школа танцев</a>
                <ul class="nav-menu">
                    <li><a href="{% url 'trifonova:user_list' %}">Ученики</a></li>
                    <li><a href="{% url 'trifonova:service_list' %}">Услуги</a></li>
                    <li><a href="{% url 'trifonova:performer_list' %}">Преподаватели</a></li>
                    <li><a href="{% url 'trifonova:order_list' %}">Заказы</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Школа танцев. Все права защищены.</p>
        </div>
    </footer>
</body>
</html>
