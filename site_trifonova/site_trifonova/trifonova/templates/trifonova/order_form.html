{% extends 'trifonova/base.html' %}

{% block title %}{% if object %}Редактирование{% else %}Создание{% endif %} заказа{% endblock %}

{% block content %}
<h1>{% if object %}✏️ Редактирование{% else %}➕ Создание{% endif %} заказа</h1>

<form method="post" class="form">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Сохранить</button>
        <a href="{% url 'trifonova:order_list' %}" class="btn btn-secondary">❌ Отмена</a>
    </div>
</form>
{% endblock %}
